workflows:
  payzo-android:
    name: Payzo Android Build
    environment:
      flutter: stable

    working_directory: payzo-mobile

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze

      - name: Run tests
        script: flutter test

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - payzo-mobile/build/app/outputs/flutter-apk/*.apk
