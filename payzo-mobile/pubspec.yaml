name: payzo
description: "A sleek, modern fintech mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Animations
  shimmer: ^3.0.0

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # WebView
  webview_flutter: ^4.10.0

  # Media
  image_picker: ^1.1.2

  # Idempotency keys
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  riverpod_annotation: ^2.3.5

flutter:
  uses-material-design: true
